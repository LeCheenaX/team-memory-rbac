services:
  hermes-local:
    profiles: ["hermes"]
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile
    environment:
      TEAM_MEMORY_TOKEN: ${LOCAL_HERMES_TOKEN:-}
      TEAM_MEMORY_MODE: local
      TEAM_MEMORY_REPO_ROOT: /opt/team-memory-rbac
      PYTHONPATH: /opt/team-memory-rbac
      LIBSQL_URL: file:/workspace/.data/test1-local-hermes/team-memory.db
      CAS_BACKEND: filesystem
      CAS_DIRECTORY: /workspace/.data/test1-local-hermes/cas
      QDRANT_URL: http://qdrant:6333
      BOOTSTRAP_ROOT_ENTITY_ID: root:test1-local
      BOOTSTRAP_USER_ID: user:test1-admin
      BOOTSTRAP_USER_NAME: Test 1 Local Admin
      BOOTSTRAP_SESSION_ID: session:test1-admin
      BOOTSTRAP_SESSION_EXPIRES_AT: "2030-01-01T00:00:00.000Z"
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - hermes-local-home:/root/.hermes
      - hermes-local-workspace:/workspace

  hermes-a:
    profiles: ["hermes"]
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile
    environment:
      TEAM_MEMORY_URL: http://service:3000
      TEAM_MEMORY_TOKEN: ${HERMES_A_TOKEN:-}
      TEAM_MEMORY_MODE: http
      PYTHONPATH: /opt/team-memory-rbac
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      service:
        condition: service_started
    volumes:
      - hermes-a-home:/root/.hermes
      - hermes-a-workspace:/workspace

  hermes-b:
    profiles: ["hermes"]
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile
    environment:
      TEAM_MEMORY_URL: http://service:3000
      TEAM_MEMORY_TOKEN: ${HERMES_B_TOKEN:-}
      TEAM_MEMORY_MODE: http
      PYTHONPATH: /opt/team-memory-rbac
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      service:
        condition: service_started
    volumes:
      - hermes-b-home:/root/.hermes
      - hermes-b-workspace:/workspace

volumes:
  hermes-local-home:
  hermes-local-workspace:
  hermes-a-home:
  hermes-a-workspace:
  hermes-b-home:
  hermes-b-workspace:
