services:
  hermes-a:
    profiles: ["hermes"]
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile
    environment:
      TEAM_MEMORY_URL: http://service:3000
      TEAM_MEMORY_TOKEN: ${HERMES_A_TOKEN:?Set HERMES_A_TOKEN before running hermes-a}
      PYTHONPATH: /opt/team-memory-rbac
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      service:
        condition: service_started
    volumes:
      - hermes-a-home:/root/.hermes
      - hermes-a-workspace:/workspace

  hermes-b:
    profiles: ["hermes"]
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile
    environment:
      TEAM_MEMORY_URL: http://service:3000
      TEAM_MEMORY_TOKEN: ${HERMES_B_TOKEN:?Set HERMES_B_TOKEN before running hermes-b}
      PYTHONPATH: /opt/team-memory-rbac
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      service:
        condition: service_started
    volumes:
      - hermes-b-home:/root/.hermes
      - hermes-b-workspace:/workspace

volumes:
  hermes-a-home:
  hermes-a-workspace:
  hermes-b-home:
  hermes-b-workspace:
